version: "2"

linters:
  default: all
  disable:
    - bodyclose # Too many false positives
    - cyclop
    - dupl
    - err113
    - exhaustive
    - exhaustruct
    - forbidigo
    - lll
    - mnd
    - nlreturn
    - noctx
    - paralleltest
    - rowserrcheck # not relevant (SQL)
    - sqlclosecheck # not relevant (SQL)
    - testpackage
    - tparallel
    - varnamelen
    - wrapcheck
    - wsl

  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/instana/testify
              desc: not allowed
            - pkg: github.com/pkg/errors
              desc: Should be replaced by standard lib errors package
    funlen:
      lines: -1
      statements: 50
    goconst:
      min-len: 5
      min-occurrences: 4
    gocyclo:
      min-complexity: 12
    godox:
      keywords:
        - FIXME
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US

  exclusions:
    warn-unused: false
    presets:
      - std-error-handling
      - comments
      - common-false-positives
    rules:
      - linters:
          - funlen
          - goconst
          - godot
        path: (.+)_test.go

issues:
  max-same-issues: 0
  max-issues-per-linter: 0

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true

